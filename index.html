<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- DNS prefetch for older browsers -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link rel="dns-prefetch" href="//krxfvrxmriwzfwzorvzw.supabase.co" />
    <link rel="dns-prefetch" href="//www.googletagmanager.com" />
    <link rel="dns-prefetch" href="//www.google-analytics.com" />
    
    <!-- Preconnect to critical origins (includes DNS + TCP + TLS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://krxfvrxmriwzfwzorvzw.supabase.co" />
    
    <!-- Preload critical font weights to bypass CSS chain -->
    <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v15/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC1C4G-EiAou6Y.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v15/QGYyz_MVcBeNP4NjuGObqx1XmO1I4bC0C4G-EiAou6Y.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Preload favicon for faster first paint -->
    <link rel="preload" href="/favicon.png" as="image" type="image/png" />
    
    <!-- Hero background image preload for LCP -->
    <link rel="preload" href="/src/assets/hero-bg.webp" as="image" type="image/webp" fetchpriority="high" />
    
    <!-- Google Fonts - non-blocking async load -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Critical CSS - inlined for FCP -->
    <style>
      /* Base reset and layout */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body { 
        font-family: 'Outfit', system-ui, sans-serif; 
        background: hsl(210 20% 98%); 
        color: hsl(215 25% 15%);
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }
      
      /* Layout utilities */
      .min-h-screen { min-height: 100vh; }
      .flex { display: flex; }
      .flex-col { flex-direction: column; }
      .flex-1 { flex: 1 1 0%; }
      .items-center { align-items: center; }
      .justify-between { justify-content: space-between; }
      .justify-center { justify-content: center; }
      .gap-2 { gap: 0.5rem; }
      .gap-3 { gap: 0.75rem; }
      .w-full { width: 100%; }
      .h-16 { height: 4rem; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
      .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
      .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
      .py-16 { padding-top: 4rem; padding-bottom: 4rem; }
      .text-sm { font-size: 0.875rem; }
      .text-xl { font-size: 1.25rem; }
      .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
      .font-bold { font-weight: 700; }
      .font-medium { font-weight: 500; }
      
      /* Header critical styles */
      .sticky { position: sticky; }
      .top-0 { top: 0; }
      .z-50 { z-index: 50; }
      .bg-primary { background: hsl(213 80% 35%); }
      .text-primary-foreground { color: hsl(0 0% 100%); }
      .bg-card { background: hsl(0 0% 100%); }
      .border-b { border-bottom-width: 1px; }
      .border-border { border-color: hsl(214 20% 88%); }
      
      /* Hero critical styles */
      .hero-section { background: linear-gradient(135deg, hsl(213 80% 30%) 0%, hsl(213 75% 20%) 100%); }
      .hero-overlay { background: linear-gradient(180deg, hsla(213 80% 15% / 0.9) 0%, hsla(213 80% 20% / 0.85) 100%); }
      .container-wide { max-width: 80rem; margin-left: auto; margin-right: auto; }
      .overflow-hidden { overflow: hidden; }
      .relative { position: relative; }
      
      /* Responsive */
      @media (min-width: 768px) {
        .md\:py-24 { padding-top: 6rem; padding-bottom: 6rem; }
        .md\:text-5xl { font-size: 3rem; line-height: 1; }
      }
      @media (min-width: 1024px) {
        .lg\:text-6xl { font-size: 3.75rem; line-height: 1; }
        .lg\:hidden { display: none; }
        .lg\:flex { display: flex; }
        .lg\:pb-0 { padding-bottom: 0; }
      }
      
      /* Loading state */
      #root:empty::after {
        content: '';
        display: block;
        width: 100%;
        min-height: 100vh;
        background: hsl(210 20% 98%);
      }
    </style>
    
    <!-- Fallback title - Helmet overrides per route -->
    <title>Blocked Drains Swindon | Expert Drain Services</title>
    <meta name="author" content="Blocked Drains Swindon" />
    <!-- Description and canonical managed by react-helmet-async per route -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- PWA meta tags -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1565a8" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Drain Help" />

    <meta property="og:title" content="Blocked Drains Swindon | Expert Blocked Drain Services" />
    <meta property="og:description" content="Professional drain unblocking in Swindon. 24/7 emergency service, no call-out fee." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://swindonblockeddrains.co.uk" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:image" content="https://swindonblockeddrains.co.uk/og/swindonblockeddrains-og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Professional drain unblocking in Swindon. 24/7 emergency service, no call-out fee." />
    <meta name="twitter:image" content="https://swindonblockeddrains.co.uk/og/swindonblockeddrains-og.jpg" />

    <meta name="geo.region" content="GB-WIL" />
    <meta name="geo.placename" content="Swindon" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- GA4 - load only on user interaction to save 56KB from critical path -->
    <script>
      function loadGA4() {
        if (window.ga4Loaded) return;
        window.ga4Loaded = true;
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-CB8VD65Z4Y';
        s.async = true;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-CB8VD65Z4Y');
      }
      ['scroll','click','touchstart'].forEach(function(e){document.addEventListener(e,loadGA4,{once:true,passive:true})});
    </script>
  </body>
</html>
